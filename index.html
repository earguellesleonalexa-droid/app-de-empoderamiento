    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>HERS — Plataforma de Empoderamiento</title>
    <style>
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        z-index: 9999;
      }
      .initial-loader__icon {
        width: 80px;
        height: 80px;
        color: #9b7c50;
        animation: initial-loader-spin 2s linear infinite;
      }
      @keyframes initial-loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
